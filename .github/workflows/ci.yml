name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "ib_analyst/[dev]" 2>/dev/null || pip install -e ib_analyst/ || true
          pip install typer[all] pydantic rich anthropic pytest

      - name: Syntax check — cli
        run: python -m py_compile ib_analyst/core/ib_analyst/cli.py

      - name: Syntax check — client
        run: python -m py_compile ib_analyst/core/ib_analyst/client.py

      - name: Syntax check — prompt
        run: python -m py_compile ib_analyst/core/ib_analyst/prompt.py

      - name: Syntax check — report_formatter
        run: python -m py_compile ib_analyst/core/ib_analyst/report_formatter.py

      - name: Syntax check — schema
        run: python -m py_compile ib_analyst/core/ib_analyst/schema.py

      - name: Syntax check — validators
        run: python -m py_compile ib_analyst/core/ib_analyst/validators.py

      - name: Syntax check — sector_benchmarks
        run: python -m py_compile ib_analyst/core/ib_analyst/sector_benchmarks.py

      - name: Syntax check — local_analysis
        run: python -m py_compile ib_analyst/core/ib_analyst/local_analysis.py

      - name: Import check
        run: |
          cd ib_analyst
          python -c "from ib_analyst.cli import app; from ib_analyst.prompt import build_user_message; from ib_analyst.schema import FinancialData; print('imports OK')"

      - name: Unit tests
        run: |
          cd ib_analyst
          python -m pytest tests/ -v --tb=short
        continue-on-error: true
